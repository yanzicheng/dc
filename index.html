<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>大橙助手 - 轻松解析</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: #0a1628; min-height: 100vh; overflow-x: hidden; }
.bg-img { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
.bg-img.layer1 { z-index: 0; } .bg-img.layer2 { z-index: 1; }
.mouse-glow { position: fixed; inset: 0; z-index: 2; background: radial-gradient(circle 40vw at var(--mx, 50%) var(--my, 50%), rgba(100,180,255,.15) 0%, rgba(80,160,255,.08) 35%, rgba(60,140,255,.03) 60%, transparent 80%); transition: background .1s ease-out; will-change: background; }
.blobs-layer { position: fixed; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
.light-blob { position: absolute; border-radius: 50%; filter: blur(90px); }
.light-blob:nth-child(1) { width:420px;height:420px;background:rgba(100,180,255,.25);top:-8%;left:-5%;animation:f1 14s ease-in-out infinite alternate; }
.light-blob:nth-child(2) { width:340px;height:340px;background:rgba(130,195,255,.2);top:25%;right:-6%;animation:f2 16s ease-in-out infinite alternate;animation-delay:-4s; }
.light-blob:nth-child(3) { width:280px;height:280px;background:rgba(80,160,255,.18);bottom:15%;left:12%;animation:f3 18s ease-in-out infinite alternate;animation-delay:-8s; }
.light-blob:nth-child(4) { width:310px;height:310px;background:rgba(74,210,255,.16);top:8%;right:18%;animation:f4 20s ease-in-out infinite alternate;animation-delay:-12s; }
.light-blob:nth-child(5) { width:360px;height:360px;background:rgba(120,140,255,.14);top:50%;left:40%;animation:f5 22s ease-in-out infinite alternate;animation-delay:-3s; }
.light-blob:nth-child(6) { width:240px;height:240px;background:rgba(110,220,255,.13);top:40%;left:3%;animation:f6 17s ease-in-out infinite alternate;animation-delay:-10s; }
.light-blob:nth-child(7) { width:300px;height:300px;background:rgba(90,170,255,.12);bottom:-5%;right:8%;animation:f7 19s ease-in-out infinite alternate;animation-delay:-15s; }
@keyframes f1 { 0%{transform:translate(0,0) scale(1);opacity:.9} 33%{transform:translate(40px,35px) scale(1.08);opacity:1} 66%{transform:translate(-20px,65px) scale(.95);opacity:.8} 100%{transform:translate(30px,90px) scale(1.04);opacity:.92} }
@keyframes f2 { 0%{transform:translate(0,0) scale(1);opacity:.85} 33%{transform:translate(-35px,50px) scale(1.06);opacity:1} 66%{transform:translate(25px,-20px) scale(.92);opacity:.75} 100%{transform:translate(-15px,70px) scale(1.03);opacity:.88} }
@keyframes f3 { 0%{transform:translate(0,0) scale(1);opacity:.8} 33%{transform:translate(30px,-28px) scale(1.1);opacity:.95} 66%{transform:translate(-18px,40px) scale(.9);opacity:.7} 100%{transform:translate(22px,55px) scale(1.02);opacity:.85} }
@keyframes f4 { 0%{transform:translate(0,0) scale(1);opacity:.78} 33%{transform:translate(-30px,42px) scale(1.05);opacity:.9} 66%{transform:translate(38px,-15px) scale(.94);opacity:.7} 100%{transform:translate(-10px,68px) scale(1.06);opacity:.82} }
@keyframes f5 { 0%{transform:translate(0,0) scale(1);opacity:.7} 33%{transform:translate(25px,38px) scale(1.08);opacity:.88} 66%{transform:translate(-32px,-12px) scale(.92);opacity:.65} 100%{transform:translate(18px,52px) scale(1.03);opacity:.78} }
@keyframes f6 { 0%{transform:translate(0,0) scale(1);opacity:.72} 33%{transform:translate(-22px,32px) scale(1.07);opacity:.86} 66%{transform:translate(28px,-22px) scale(.93);opacity:.68} 100%{transform:translate(-14px,48px) scale(1.01);opacity:.8} }
@keyframes f7 { 0%{transform:translate(0,0) scale(1);opacity:.65} 33%{transform:translate(24px,30px) scale(1.05);opacity:.8} 66%{transform:translate(-26px,-18px) scale(.96);opacity:.6} 100%{transform:translate(12px,42px) scale(1.02);opacity:.74} }
.qq-home-content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; padding: 80px 20px 40px; min-height: 100vh; }
.qq-home-content .main-hero { flex-shrink: 0; }
.platform-area-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; width: 100%; max-width: 700px; }
.main-hero { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; padding-top: 60px; }
.main-title-area { position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 48px; }
.title-glow-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: blur(10px); animation: titleBreath 2s ease infinite alternate; display: flex; align-items: center; justify-content: center; }
.title-glow-layer .main-title-text { color: rgba(100,180,255,.6); }
@keyframes titleBreath { 0%{opacity:0} 100%{opacity:1} }
.main-title-text { font-size: 77px; font-weight: 400; color: #fff; font-family: "PingFang SC", sans-serif; position: relative; z-index: 2; text-shadow: 0 2px 30px rgba(22,119,255,.4), 0 0 60px rgba(100,180,255,.15); letter-spacing: 4px; }
.input-card { background: rgba(255,255,255,.12); backdrop-filter: blur(25px); border-radius: 40px; padding: 8px 8px 8px 24px; display: flex; align-items: center; gap: 12px; max-width: 560px; width: 100%; box-shadow: 0 4px 23px rgba(0,0,0,.25); margin-bottom: 20px; transition: transform .3s, box-shadow .3s; border: 1px solid rgba(255,255,255,.15); }
.input-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,.3); }
.url-input { flex: 1; height: 48px; border: none; background: rgba(255,255,255,.1); border-radius: 28px; padding: 0 18px; font-size: 16px; color: #fff; outline: none; letter-spacing: .5px; }
.url-input::placeholder { color: rgba(255,255,255,.4); }
.btn { height: 48px; padding: 0 36px; border: none; border-radius: 28px; font-size: 16px; font-weight: 600; color: #fff; background: rgba(255,255,255,.15); backdrop-filter: blur(15px); cursor: pointer; white-space: nowrap; letter-spacing: 3px; transition: all .3s; border: 1px solid rgba(255,255,255,.25); }
.btn:hover { transform: scale(1.03); background: rgba(255,255,255,.22); box-shadow: 0 6px 20px rgba(0,0,0,.2); }
.btn:active { transform: scale(.98); } .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: none; }
.player-section { display: none; margin-top: 20px; border-radius: 24px; overflow: hidden; background: rgba(0,0,0,.5); backdrop-filter: blur(15px); animation: fadeUp .4s ease both; max-width: 900px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.player-section.active { display: block; }
.video-wrap { position: relative; background: #000; display: flex; align-items: center; justify-content: center; min-height: 210px; }
.video-wrap video { width: 100%; max-height: 58vh; outline: none; display: block; }
.video-wrap iframe { width: 100%; height: 58vh; border: none; display: block; background: #000; }
.loading-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; pointer-events: none; transition: opacity .3s; background: rgba(0,0,0,.82); }
.loading-overlay.hidden { opacity: 0; }
.spinner { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,.18); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.player-controls { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; gap: 10px; flex-wrap: wrap; background: rgba(255,255,255,.08); }
.player-info { font-size: 13px; color: rgba(255,255,255,.7); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-actions { display: flex; gap: 8px; flex-shrink: 0; }
.icon-btn { width: 36px; height: 32px; border-radius: 10px; border: none; background: rgba(255,255,255,.12); color: rgba(255,255,255,.7); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.icon-btn:hover { background: rgba(255,255,255,.25); color: #fff; }
.platform-area { margin-top: auto; width: 100%; max-width: 700px; padding-top: 40px; }
.platform-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 28px; }
.platform-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; transition: transform .3s; }
.platform-item:hover { transform: translateY(-6px); }
.platform-icon { width: 56px; height: 56px; border-radius: 16px; background: rgba(255,255,255,.1); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; transition: background .3s; border: 1px solid rgba(255,255,255,.1); }
.platform-icon-img { width: 44px; height: auto; max-height: 48px; object-fit: contain; transition: all .3s; }
.platform-item:hover .platform-icon-img { transform: scale(1.08); }
.platform-item:hover .platform-icon { background: rgba(255,255,255,.2); }
.page-footer { margin-top: 50px; padding: 30px 20px; text-align: center; font-size: 12px; color: rgba(255,255,255,.35); }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); padding: 12px 26px; border-radius: 16px; font-size: 13px; z-index: 100; pointer-events: none; opacity: 0; transition: opacity .3s; background: rgba(255,255,255,.95); color: #333; box-shadow: 0 8px 24px rgba(0,0,0,.15); max-width: 90%; text-align: center; }
.toast.show { opacity: 1; } .toast.error { background: #fff2f0; color: #cf1322; } .toast.success { background: #f6ffed; color: #389e0d; } .toast.info { background: #e6f7ff; color: #1677ff; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 768px) { .main-title-text { font-size: 46px; } .main-hero { padding-top: 30px; } .input-card { border-radius: 28px; padding: 18px 18px 16px; gap: 14px; } .btn { height: 50px; border-radius: 25px; font-size: 16px; } .url-input { height: 50px; } .platform-grid { gap: 20px; } .platform-icon { width: 48px; height: 48px; } .qq-home-content { padding: 40px 16px 20px; } .light-blob:nth-child(1) { width:260px;height:260px; } .light-blob:nth-child(2) { width:210px;height:210px; } .light-blob:nth-child(3) { width:170px;height:170px; } .light-blob:nth-child(4) { width:190px;height:190px; } .light-blob:nth-child(5) { width:230px;height:230px; } .light-blob:nth-child(6) { width:150px;height:150px; } .light-blob:nth-child(7) { width:190px;height:190px; } }
@media (max-width: 480px) { .main-title-text { font-size: 36px; letter-spacing: 2px; } }
</style>
</head>
<body>

<img class="bg-img layer1" src="main-video-bg.webp" alt="">
<img class="bg-img layer2" src="home-static-img.webp" alt="">

<div class="mouse-glow"></div>

<div class="blobs-layer">
  <div class="light-blob"></div><div class="light-blob"></div><div class="light-blob"></div>
  <div class="light-blob"></div><div class="light-blob"></div><div class="light-blob"></div>
  <div class="light-blob"></div>
</div>

<div class="qq-home-content">
  <div class="main-hero">
    <div class="main-title-area">
      <div class="title-glow-layer"><span class="main-title-text">大橙助手</span></div>
      <span class="main-title-text">大橙助手</span>
    </div>

    <div class="input-card">
      <input type="text" class="url-input" id="urlInput" placeholder="粘贴视频链接" autocomplete="off" autofocus>
      <button class="btn" id="parseBtn" onclick="doParse()">播放</button>
    </div>

    <div class="player-section" id="playerSection">
      <div class="video-wrap">
        <video id="video" controls autoplay playsinline webkit-playsinline style="display:none;"></video>
        <iframe id="videoIframe" style="display:none;" allowfullscreen allow="autoplay;encrypted-media"></iframe>
        <div class="loading-overlay" id="loadingOverlay">
          <div class="spinner"></div>
          <span style="color:rgba(255,255,255,.55);font-size:13px;">正在加载视频流...</span>
        </div>
      </div>
      <div class="player-controls">
        <div class="player-info" id="playerInfo">准备就绪</div>
        <div class="player-actions">
          <button class="icon-btn" onclick="toggleFullscreen()" title="全屏">⛶</button>
          <button class="icon-btn" onclick="reloadPlayer()" title="重新加载">🔄</button>
          <button class="icon-btn" onclick="closePlayer()" title="关闭">✕</button>
        </div>
      </div>
    </div>
  </div>

  <div class="platform-area-wrap">
    <div class="platform-area">
      <div class="platform-grid">
        <a class="platform-item" href="https://v.qq.com" target="_blank"><img class="platform-icon-img" src="icons/tencent.png" alt="腾讯视频"></a>
        <a class="platform-item" href="https://www.iqiyi.com" target="_blank"><img class="platform-icon-img" src="icons/iqiyi.png" alt="爱奇艺"></a>
        <a class="platform-item" href="https://www.youku.com" target="_blank"><img class="platform-icon-img" src="icons/youku.png" alt="优酷"></a>
        <a class="platform-item" href="https://www.mgtv.com" target="_blank"><img class="platform-icon-img" src="icons/mgtv.png" alt="芒果TV"></a>
        <a class="platform-item" href="https://www.bilibili.com" target="_blank"><img class="platform-icon-img" src="icons/bilibili.png" alt="B站"></a>
      </div>
    </div>
  </div>

  <div class="page-footer">所有内容仅供个人学习研究，未经版权方许可，不得复制、售卖、商用</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const WORKER_URL = 'https://dc-worker.yanzicheng888.workers.dev';
const $ = id => document.getElementById(id);
const video = $('video');
const iframe = $('videoIframe');
const loadingOverlay = $('loadingOverlay');
let hlsInstance = null, currentSourceUrl = '';

function toggleFullscreen() {
  const el = document.fullscreenElement ? document : (video.style.display !== 'none' ? video : iframe);
  document.fullscreenElement ? document.exitFullscreen() : el.requestFullscreen();
}
function reloadPlayer() { if (!currentSourceUrl) return; closePlayer(); doParseWithUrl(currentSourceUrl); }
function closePlayer() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  video.pause(); video.removeAttribute('src'); video.style.display = 'none';
  iframe.src = ''; iframe.style.display = 'none';
  $('playerSection').classList.remove('active'); $('playerInfo').textContent = '准备就绪'; currentSourceUrl = '';
}

async function doParse() {
  const url = $('urlInput').value.trim();
  if (!url) { toast('请输入视频链接', 'error'); return; }
  currentSourceUrl = url; await doParseWithUrl(url);
}

async function doParseWithUrl(url) {
  const btn = $('parseBtn'); const origText = btn.textContent;
  btn.disabled = true; btn.textContent = '解析中...';
  $('playerSection').classList.add('active');
  $('loadingOverlay').classList.remove('hidden');
  video.style.display = 'none'; iframe.style.display = 'none';
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  $('playerInfo').textContent = '正在解析...';
  try {
    const resp = await fetch(WORKER_URL + '/?url=' + encodeURIComponent(url));
    const data = await resp.json();
    if (!data.ok) { throw new Error(data.error || '解析失败'); }
    $('playerInfo').textContent = data.type === 'm3u8' ? '直连播放' : '页面播放';
    $('loadingOverlay').classList.remove('hidden');
    if (data.type === 'm3u8') {
      video.style.display = 'block'; iframe.style.display = 'none'; playM3u8(data.url, url);
      toast('解析成功 · 直连播放', 'success');
    } else {
      video.style.display = 'none'; iframe.style.display = 'block'; iframe.src = data.url;
      iframe.onload = () => $('loadingOverlay').classList.add('hidden');
      toast('已加载播放页面', 'info');
    }
  } catch (e) {
    $('loadingOverlay').classList.add('hidden'); $('playerInfo').textContent = '解析失败';
    toast(e.message || '网络错误', 'error');
  }
  btn.disabled = false; btn.textContent = origText;
}

function playM3u8(m3u8Url, sourceUrl) {
  if (Hls.isSupported()) {
    hlsInstance = new Hls({
      lowLatencyMode: false, manifestLoadingTimeOut: 20000, manifestLoadingMaxRetry: 3,
      levelLoadingTimeOut: 20000, fragLoadingTimeOut: 30000,
      xhrSetup: function(xhr, url) {
        if (url.indexOf('v.qq.com') !== -1 || url.indexOf('tvplive.qq.com') !== -1) xhr.setRequestHeader('Referer', 'https://v.qq.com/');
        else if (url.indexOf('iqiyi.com') !== -1) xhr.setRequestHeader('Referer', 'https://www.iqiyi.com/');
        else if (url.indexOf('youku.com') !== -1) xhr.setRequestHeader('Referer', 'https://www.youku.com/');
        var origin = location.origin; if (origin !== 'null') xhr.setRequestHeader('Origin', origin);
      }
    });
    hlsInstance.loadSource(m3u8Url); hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { $('loadingOverlay').classList.add('hidden'); video.play().catch(() => {}); });
    hlsInstance.on(Hls.Events.ERROR, function(e, d) { if (d.fatal) { $('loadingOverlay').classList.add('hidden'); toast('播放失败: ' + d.details, 'error'); } });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = m3u8Url;
    video.addEventListener('loadedmetadata', () => { $('loadingOverlay').classList.add('hidden'); video.play().catch(() => {}); });
  } else { $('loadingOverlay').classList.add('hidden'); toast('浏览器不支持 HLS 播放', 'error'); }
}

$('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') doParse(); });

function toast(msg, type) {
  const t = $('toast'); t.textContent = msg; t.className = 'toast ' + (type || '') + ' show';
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

(function() {
  var mg = document.querySelector('.mouse-glow'); if (!mg) return;
  mg.style.setProperty('--mx', '50%'); mg.style.setProperty('--my', '50%');
  var rafId = null;
  document.addEventListener('mousemove', function(e) {
    if (rafId) return;
    rafId = requestAnimationFrame(function() {
      mg.style.setProperty('--mx', (e.clientX / window.innerWidth * 100) + '%');
      mg.style.setProperty('--my', (e.clientY / window.innerHeight * 100) + '%');
      rafId = null;
    });
  });
  document.addEventListener('mouseleave', function() { mg.style.setProperty('--mx', '50%'); mg.style.setProperty('--my', '50%'); });
})();
</script>
</body>
</html>
